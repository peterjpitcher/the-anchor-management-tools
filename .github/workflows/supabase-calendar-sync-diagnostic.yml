name: Supabase calendar sync diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/supabase-calendar-sync-diagnostic.yml

permissions:
  contents: read

jobs:
  migration-status:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check required configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show migration status
        run: supabase migration list

      - name: Dry-run pending migrations
        run: supabase db push --dry-run
